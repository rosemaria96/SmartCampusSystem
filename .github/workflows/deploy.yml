name: SmartCampus CI/CD

# Trigger workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 3. Log in to Docker Hub
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. Build Docker image
    - name: Build Docker image
      run: |
        docker build -t smartcampus-backend:latest .

    # 5. Tag and push Docker image to Docker Hub
    - name: Push Docker image
      run: |
        docker tag smartcampus-backend:latest ${{ secrets.DOCKER_USERNAME }}/smartcampus-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/smartcampus-backend:latest

    # 6. SSH to server and deploy
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Stop and remove old container if it exists
          docker stop smartcampus-backend || true
          docker rm smartcampus-backend || true

          # Pull latest Docker image
          docker pull ${{ secrets.DOCKER_USERNAME }}/smartcampus-backend:latest

          # Run new container
          docker run -d -p 8000:8000 --name smartcampus-backend ${{ secrets.DOCKER_USERNAME }}/smartcampus-backend:latest

          # Clean up old unused images to save disk space
          docker image prune -f
